<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个在浏览器本地运行的轻量化个人专注计时器。"
    />
    <title>专注核心</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">FOCUS CORE</p>
          <h1 class="app-title">专注核心</h1>
        </div>

        <button class="icon-button" type="button" aria-label="打开设置" title="设置">
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <main class="app-main">
        <section class="focus-panel" aria-labelledby="timer-title">
          <div class="energy-core" aria-label="能量核心球占位区域">
            <div class="energy-core__inner">
              <span>能量核心</span>
              <small>CORE</small>
            </div>
          </div>

          <div class="timer">
            <h2 id="timer-title" class="visually-hidden">专注计时器</h2>
            <p class="timer__label" data-timer-status>未开始</p>
            <time
              class="timer__display"
              data-timer-display
              datetime="PT0S"
              aria-live="off"
            >00:00:00</time>
            <button class="primary-button" data-timer-action type="button">
              开始专注
            </button>
          </div>
        </section>

        <section class="data-section" aria-labelledby="data-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">OVERVIEW</p>
              <h2 id="data-title">专注概览</h2>
            </div>
            <p>你的每一次投入，都会在这里留下痕迹。</p>
          </div>

          <div class="stats-grid">
            <article class="stat-card">
              <p>今日专注</p>
              <strong>0<small> 分钟</small></strong>
            </article>
            <article class="stat-card">
              <p>本周专注</p>
              <strong>0<small> 分钟</small></strong>
            </article>
            <article class="stat-card">
              <p>累计专注</p>
              <strong>0<small> 小时</small></strong>
            </article>
            <article class="stat-card">
              <p>连续专注天数</p>
              <strong>0<small> 天</small></strong>
            </article>
          </div>
        </section>

        <section class="heatmap-section" aria-labelledby="heatmap-title">
          <div class="section-heading section-heading--compact">
            <div>
              <p class="eyebrow">ACTIVITY</p>
              <h2 id="heatmap-title">专注热力图</h2>
            </div>
          </div>

          <div class="heatmap-placeholder" aria-label="专注热力图占位区域">
            <div class="heatmap-placeholder__grid" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p>热力图区域</p>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <p>让专注成为一种稳定的能量。</p>
      </footer>
    </div>

    <script defer src="./js/storage.js"></script>
    <script defer src="./js/timer.js"></script>
    <script defer src="./js/statistics.js"></script>
    <script defer src="./js/app.js"></script>
  </body>
</html>
